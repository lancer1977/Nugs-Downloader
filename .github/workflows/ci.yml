name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Restore
      run: dotnet restore csharp/NugsDownloader.sln

    - name: Test
      run: dotnet test csharp/NugsDownloader.sln --no-restore -m:1 -p:UseSharedCompilation=false --logger 'console;verbosity=minimal'

    - name: Build
      run: dotnet build csharp/NugsDownloader.sln --no-restore -m:1
